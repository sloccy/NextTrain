name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libfreetype6

      - name: Install pebble-tool
        run: pip install git+https://github.com/coredevices/pebble-tool.git

      - name: Cache Pebble SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/.pebble-sdk
          key: pebble-sdk-latest-v1

      - name: Install SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.pebble-sdk && touch ~/.pebble-sdk/NO_TRACKING
          yes | pebble sdk install latest

      - name: Build
        run: yes | pebble build

      - name: Create or update latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          body: "Automatically built from the latest commit on main."
          artifacts: "build/NextTrain.pbw"
          allowUpdates: true
          removeArtifacts: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
